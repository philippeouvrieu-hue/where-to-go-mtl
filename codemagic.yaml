workflows:
  ios-release:
    name: What's the Move — iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.whatsthemove.mtl
      vars:
        XCODE_SCHEME: App
        BUNDLE_ID: com.whatsthemove.mtl
      node: 20.11.0

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app (Vite)
        script: npm run build

      - name: Add iOS platform (first time)
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set app version
        script: |
          LATEST_BUILD=$(app-store-connect get-latest-build-number "$BUNDLE_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $((LATEST_BUILD + 1))
          agvtool new-marketing-version 1.0.0

      - name: Build and sign IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - philippe.ouvrieu@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
