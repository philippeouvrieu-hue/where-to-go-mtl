<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png" />

    <!-- Viewport — viewport-fit=cover pour l'encoche iPhone -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA — plein écran sans barre Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WTG Mtl" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Couleur de la barre de statut iOS (dark) -->
    <meta name="theme-color" content="#080810" />

    <!-- SEO -->
    <title>Where To Go Montréal — Soirées, clubs & DJ sets</title>
    <meta name="description" content="Découvrez les meilleures soirées, concerts, DJ sets, clubs et afterhours à Montréal. Filtres par style, quartier, prix et date." />

    <!-- Open Graph -->
    <meta property="og:title" content="Where To Go Montréal" />
    <meta property="og:description" content="L'agenda nightlife de Montréal : techno, house, rap, afro, latino, concerts et afterhours." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />

    <!-- Évite le zoom involontaire sur les inputs iOS -->
    <style>
      input, select, textarea { font-size: 16px; }
      /* Safe area pour l'encoche et la Dynamic Island */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
