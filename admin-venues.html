<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Venues — The Move MTL</title>
<style>
  :root {
    --bg: #0a0a14;
    --surface: #13131f;
    --surface2: #1a1a2e;
    --border: #1e1e2e;
    --accent: #f0146b;
    --accent2: #7c3aed;
    --text: #ffffff;
    --text2: rgba(255,255,255,0.55);
    --text3: rgba(255,255,255,0.25);
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* ── Layout ── */
  #app { display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: 300px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  #main { flex: 1; overflow-y: auto; padding: 32px; }

  /* ── Header ── */
  .sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); }
  .sidebar-header h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .sidebar-header h1 span { color: var(--accent); }
  .sidebar-header p { font-size: 11px; color: var(--text2); margin-top: 3px; }

  /* ── Search ── */
  .search-box { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .search-box input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; outline: none; }
  .search-box input:focus { border-color: var(--accent); }

  /* ── Stats bar ── */
  .stats-bar { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 16px; }
  .stat { text-align: center; }
  .stat-val { font-size: 16px; font-weight: 800; color: var(--accent); }
  .stat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }

  /* ── Venue list ── */
  #venue-list { flex: 1; overflow-y: auto; padding: 8px; }
  .venue-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; margin-bottom: 4px; transition: background 0.15s; }
  .venue-item:hover { background: var(--surface2); }
  .venue-item.active { background: rgba(240,20,107,0.12); border: 1px solid rgba(240,20,107,0.25); }
  .venue-thumb { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; background: var(--border); flex-shrink: 0; }
  .venue-item-info { flex: 1; min-width: 0; }
  .venue-item-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .venue-item-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .diff-badge { display: inline-flex; align-items: center; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
  .diff-facile  { background: rgba(52,211,153,0.15); color: var(--green); }
  .diff-modéré  { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .diff-difficile { background: rgba(248,113,113,0.15); color: var(--red); }

  /* ── Main panel ── */
  .panel-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; gap: 16px; }
  .panel-title { font-size: 28px; font-weight: 900; letter-spacing: -1px; }
  .panel-subtitle { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #d01060; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
  .btn-danger:hover { background: rgba(248,113,113,0.2); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Cards & Sections ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
  .card-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-grid.cols-1 { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.span2 { grid-column: span 2; }
  .form-group.span3 { grid-column: span 3; }
  label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
  input[type=text], input[type=number], input[type=url], select, textarea {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px;
    color: var(--text); font-size: 13px; outline: none; width: 100%; transition: border-color 0.15s;
    font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  select option { background: var(--surface2); }

  /* ── Photos gallery ── */
  .photos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 12px; }
  .photo-card { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 4/3; background: var(--border); }
  .photo-card img { width: 100%; height: 100%; object-fit: cover; }
  .photo-card .remove-btn { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.7); border: none; color: #fff; width: 24px; height: 24px; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
  .photo-card:hover .remove-btn { opacity: 1; }
  .photo-card.main-photo { outline: 2px solid var(--accent); }
  .main-badge { position: absolute; bottom: 6px; left: 6px; background: var(--accent); color: #fff; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; }
  .add-photo-input { display: flex; gap: 8px; }
  .add-photo-input input { flex: 1; }

  /* ── Tags ── */
  .tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .tag-chip { display: flex; align-items: center; gap: 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 12px; }
  .tag-chip button { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 13px; line-height: 1; }
  .tag-chip button:hover { color: var(--red); }
  .tags-input { display: flex; gap: 8px; }

  /* ── Music styles checkboxes ── */
  .music-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .music-chip { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.15s; user-select: none; }
  .music-chip input { display: none; }
  .music-chip:has(input:checked) { background: rgba(124,58,237,0.2); border-color: var(--accent2); color: #a78bfa; }

  /* ── Toggle ── */
  .toggle-wrap { display: flex; align-items: center; gap: 10px; }
  .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 24px; cursor: pointer; transition: 0.2s; }
  .toggle-slider:before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: var(--text2); border-radius: 50%; transition: 0.2s; }
  .toggle input:checked + .toggle-slider { background: var(--accent); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(20px); background: #fff; }
  .toggle-label { font-size: 13px; color: var(--text); }

  /* ── Rating stars ── */
  .stars { display: flex; gap: 4px; }
  .star { font-size: 20px; cursor: pointer; color: var(--border); transition: color 0.15s; }
  .star.active, .star:hover { color: var(--yellow); }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; max-width: 320px; }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error { border-color: var(--red); color: var(--red); }

  /* ── Empty state ── */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: var(--text2); padding: 40px; gap: 12px; }
  .empty-icon { font-size: 48px; }
  .empty h2 { font-size: 20px; font-weight: 700; color: var(--text); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Add venue panel ── */
  #add-btn { width: calc(100% - 16px); margin: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; background: rgba(240,20,107,0.1); border: 1px dashed rgba(240,20,107,0.3); border-radius: 10px; color: var(--accent); font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  #add-btn:hover { background: rgba(240,20,107,0.18); }

  @media (max-width: 768px) {
    #app { flex-direction: column; }
    #sidebar { width: 100%; height: auto; max-height: 40vh; }
    #main { padding: 16px; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid.cols-3 { grid-template-columns: 1fr; }
    .form-group.span2, .form-group.span3 { grid-column: span 1; }
  }
</style>
</head>
<body>

<div id="app">
  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <div class="sidebar-header">
      <h1>The Move <span>Admin</span></h1>
      <p>Base de données des venues</p>
    </div>
    <div class="search-box">
      <input type="text" id="search" placeholder="Chercher un venue…" oninput="filterVenues()"/>
    </div>
    <div class="stats-bar" id="stats-bar">
      <div class="stat"><div class="stat-val" id="stat-count">—</div><div class="stat-lbl">Venues</div></div>
      <div class="stat"><div class="stat-val" id="stat-synced">—</div><div class="stat-lbl">Synced</div></div>
    </div>
    <div id="venue-list"></div>
    <button id="add-btn" onclick="newVenue()">+ Ajouter un venue</button>
  </div>

  <!-- ── Main panel ── -->
  <div id="main">
    <div class="empty" id="empty-state">
      <div class="empty-icon">🏙️</div>
      <h2>Sélectionne un venue</h2>
      <p>Choisis un venue dans la liste pour voir et modifier ses informations.</p>
    </div>
    <div id="editor" style="display:none">
      <!-- injected by JS -->
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Config Supabase ─────────────────────────────────────────────────────────
const SUPABASE_URL = "https://alizpnpwztbzgvrrxplf.supabase.co";
const SUPABASE_KEY = "sb_publishable_bK6FfNhhlRBQhLpHpXvEoA_EAWEDx2l";

const MUSIC_OPTIONS = ["house", "techno", "afrobeat", "hip-hop", "R&B", "latin", "reggaeton",
  "électro", "underground", "EDM", "rock", "indie", "punk", "jazz", "lounge", "varied", "expérimental"];

// ── State ───────────────────────────────────────────────────────────────────
let allVenues = [];        // from Supabase
let currentId = null;      // selected venue id
let isDirty = false;       // unsaved changes

// ── Supabase helpers ─────────────────────────────────────────────────────────
async function sbFetch(method, path, body = null) {
  const opts = {
    method,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "resolution=merge-duplicates,return=representation",
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, opts);
  const txt = await r.text();
  return { ok: r.ok, status: r.status, data: txt ? JSON.parse(txt) : null };
}

async function loadVenues() {
  const { ok, data } = await sbFetch("GET", "venues?select=*&order=name.asc");
  if (!ok) {
    showToast("❌ Impossible de charger les venues (table existe?)", "error");
    return;
  }
  allVenues = data || [];
  document.getElementById("stat-count").textContent = allVenues.length;
  document.getElementById("stat-synced").textContent = allVenues.length;
  renderList();
}

// ── List rendering ───────────────────────────────────────────────────────────
function filterVenues() {
  const q = document.getElementById("search").value.toLowerCase();
  renderList(q);
}

function diffClass(d) {
  if (!d) return "";
  const s = d.toLowerCase();
  if (s.includes("facile")) return "diff-facile";
  if (s.includes("difficile")) return "diff-difficile";
  return "diff-modéré";
}

function renderList(filter = "") {
  const list = document.getElementById("venue-list");
  const venues = filter
    ? allVenues.filter(v => (v.name || "").toLowerCase().includes(filter) || (v.neighborhood || "").toLowerCase().includes(filter))
    : allVenues;

  if (!venues.length) {
    list.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text3);font-size:12px;">Aucun venue trouvé</div>`;
    return;
  }
  list.innerHTML = venues.map(v => `
    <div class="venue-item ${v.id === currentId ? 'active' : ''}" onclick="selectVenue('${v.id}')">
      <img class="venue-thumb" src="${v.photo_main || ''}" onerror="this.src=''" alt="${v.name}"/>
      <div class="venue-item-info">
        <div class="venue-item-name">${v.name}</div>
        <div class="venue-item-meta">${v.neighborhood || ''} · <span class="diff-badge ${diffClass(v.entry_difficulty)}">${v.entry_difficulty || '—'}</span></div>
      </div>
    </div>
  `).join("");
}

// ── Select / load venue ───────────────────────────────────────────────────────
function selectVenue(id) {
  if (isDirty && !confirm("Des modifications non sauvegardées seront perdues. Continuer?")) return;
  currentId = id;
  isDirty = false;
  const v = allVenues.find(x => x.id === id);
  if (!v) return;
  renderList(document.getElementById("search").value.toLowerCase());
  renderEditor(v);
}

// ── Editor ───────────────────────────────────────────────────────────────────
function renderEditor(v) {
  document.getElementById("empty-state").style.display = "none";
  const ed = document.getElementById("editor");
  ed.style.display = "block";

  const musicChecked = (style) => (v.music_styles || []).includes(style) ? "checked" : "";
  const tagsHtml = (v.tags || []).map(t => `
    <span class="tag-chip" data-tag="${t}">${t}<button onclick="removeTag(this,'${t}')">×</button></span>
  `).join("");
  const photosHtml = (v.photos || []).map((url, i) => `
    <div class="photo-card ${i === 0 ? 'main-photo' : ''}" data-url="${url}">
      <img src="${url}" onerror="this.parentElement.style.opacity='0.3'" />
      ${i === 0 ? '<span class="main-badge">Principal</span>' : ''}
      <button class="remove-btn" onclick="removePhoto('${url}')">×</button>
    </div>
  `).join("");

  ed.innerHTML = `
    <div class="panel-header">
      <div>
        <div class="panel-title" id="venue-title">${v.name}</div>
        <div class="panel-subtitle">${v.neighborhood || ''} · ${v.type || ''}</div>
      </div>
      <div style="display:flex;gap:10px;flex-shrink:0;">
        <button class="btn btn-danger" onclick="deleteVenue()">🗑 Supprimer</button>
        <button class="btn btn-primary" onclick="saveVenue()" id="save-btn">💾 Sauvegarder</button>
      </div>
    </div>

    <!-- Infos générales -->
    <div class="card">
      <div class="card-title">📍 Infos générales</div>
      <div class="form-grid">
        <div class="form-group span2">
          <label>Nom</label>
          <input type="text" id="f-name" value="${esc(v.name)}" oninput="markDirty(); document.getElementById('venue-title').textContent = this.value"/>
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="f-type">
            ${["bar-club","club","bar-lounge","bar-concert","concert-hall","festival-club","club-art"].map(t =>
              `<option value="${t}" ${v.type===t?'selected':''}>${t}</option>`).join("")}
          </select>
        </div>
        <div class="form-group">
          <label>Quartier</label>
          <input type="text" id="f-neighborhood" value="${esc(v.neighborhood)}" oninput="markDirty()"/>
        </div>
        <div class="form-group span2">
          <label>Adresse</label>
          <input type="text" id="f-address" value="${esc(v.address)}" oninput="markDirty()"/>
        </div>
        <div class="form-group">
          <label>Latitude</label>
          <input type="number" id="f-lat" value="${v.lat || ''}" step="0.0001" oninput="markDirty()"/>
        </div>
        <div class="form-group">
          <label>Longitude</label>
          <input type="number" id="f-lng" value="${v.lng || ''}" step="0.0001" oninput="markDirty()"/>
        </div>
        <div class="form-group">
          <label>Website</label>
          <input type="url" id="f-website" value="${esc(v.website)}" oninput="markDirty()"/>
        </div>
        <div class="form-group">
          <label>Instagram</label>
          <input type="text" id="f-instagram" value="${esc(v.instagram)}" oninput="markDirty()"/>
        </div>
        <div class="form-group">
          <label>Téléphone</label>
          <input type="text" id="f-phone" value="${esc(v.phone)}" oninput="markDirty()"/>
        </div>
        <div class="form-group">
          <label>Heures d'ouverture</label>
          <input type="text" id="f-hours" value="${esc(v.hours)}" oninput="markDirty()"/>
        </div>
        <div class="form-group">
          <label>Capacité</label>
          <input type="number" id="f-capacity" value="${v.capacity || ''}" oninput="markDirty()"/>
        </div>
        <div class="form-group">
          <label>Note (0–5)</label>
          <div class="stars" id="stars-wrap">
            ${[1,2,3,4,5].map(n => `<span class="star ${n <= (v.rating||0) ? 'active' : ''}" onclick="setRating(${n})">★</span>`).join("")}
          </div>
          <input type="hidden" id="f-rating" value="${v.rating || 0}"/>
        </div>
      </div>
    </div>

    <!-- Ambiance & musique -->
    <div class="card">
      <div class="card-title">🎵 Ambiance & musique</div>
      <div class="form-grid cols-1">
        <div class="form-group">
          <label>Vibe / description</label>
          <textarea id="f-vibe" oninput="markDirty()">${esc(v.vibe)}</textarea>
        </div>
        <div class="form-group">
          <label>Type de clientèle</label>
          <input type="text" id="f-crowd" value="${esc(v.crowd_type)}" oninput="markDirty()"/>
        </div>
        <div class="form-group">
          <label>Styles musicaux</label>
          <div class="music-grid" id="music-grid">
            ${MUSIC_OPTIONS.map(s => `
              <label class="music-chip">
                <input type="checkbox" value="${s}" ${musicChecked(s)} onchange="markDirty()"/>
                ${s}
              </label>
            `).join("")}
          </div>
        </div>
      </div>
    </div>

    <!-- Prix & entrée -->
    <div class="card">
      <div class="card-title">💰 Prix & entrée</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Prix entrée typique</label>
          <input type="text" id="f-cover" value="${esc(v.cover_typical)}" placeholder="ex: Gratuit–20$" oninput="markDirty()"/>
        </div>
        <div class="form-group">
          <label>Notes sur l'entrée</label>
          <input type="text" id="f-cover-notes" value="${esc(v.cover_notes)}" oninput="markDirty()"/>
        </div>
        <div class="form-group">
          <label>Bière (prix)</label>
          <input type="text" id="f-beer" value="${esc(v.drink_price_beer)}" placeholder="ex: 8$–10$" oninput="markDirty()"/>
        </div>
        <div class="form-group">
          <label>Cocktail (prix)</label>
          <input type="text" id="f-cocktail" value="${esc(v.drink_price_cocktail)}" placeholder="ex: 14$–18$" oninput="markDirty()"/>
        </div>
        <div class="form-group">
          <label>Difficulté d'entrée</label>
          <select id="f-difficulty" onchange="markDirty()">
            ${["Facile","Modéré","Difficile"].map(d => `<option ${v.entry_difficulty===d?'selected':''}>${d}</option>`).join("")}
          </select>
        </div>
        <div class="form-group">
          <label>Dress code</label>
          <input type="text" id="f-dresscode" value="${esc(v.dress_code)}" oninput="markDirty()"/>
        </div>
        <div class="form-group">
          <label>Temps d'attente typique</label>
          <input type="text" id="f-wait" value="${esc(v.wait_time_typical)}" placeholder="ex: 10–25 min" oninput="markDirty()"/>
        </div>
        <div class="form-group" style="display:flex;flex-direction:column;gap:14px;justify-content:center;">
          <div class="toggle-wrap">
            <label class="toggle"><input type="checkbox" id="f-guestlist" ${v.guestlist_recommended?'checked':''} onchange="markDirty()"/><span class="toggle-slider"></span></label>
            <span class="toggle-label">Guestlist recommandée</span>
          </div>
          <div class="toggle-wrap">
            <label class="toggle"><input type="checkbox" id="f-facecontrol" ${v.face_control?'checked':''} onchange="markDirty()"/><span class="toggle-slider"></span></label>
            <span class="toggle-label">Face control / sélection</span>
          </div>
        </div>
        <div class="form-group span2">
          <label>Notes & conseils</label>
          <textarea id="f-notes" oninput="markDirty()">${esc(v.notes)}</textarea>
        </div>
      </div>
    </div>

    <!-- Photos -->
    <div class="card">
      <div class="card-title">📷 Galerie photos</div>
      <div class="photos-grid" id="photos-grid">${photosHtml}</div>
      <div class="add-photo-input">
        <input type="url" id="new-photo-url" placeholder="URL d'une photo (https://…)" onkeydown="if(event.key==='Enter'){addPhoto();event.preventDefault()}"/>
        <button class="btn btn-secondary" onclick="addPhoto()">Ajouter</button>
      </div>
    </div>

    <!-- Tags -->
    <div class="card">
      <div class="card-title">🏷 Tags</div>
      <div class="tags-wrap" id="tags-wrap">${tagsHtml}</div>
      <div class="tags-input">
        <input type="text" id="new-tag" placeholder="Nouveau tag…" onkeydown="if(event.key==='Enter'){addTag();event.preventDefault()}"/>
        <button class="btn btn-secondary" onclick="addTag()">Ajouter</button>
      </div>
    </div>
  `;
}

// ── Form helpers ─────────────────────────────────────────────────────────────
function esc(s) { return (s||"").replace(/"/g, '&quot;').replace(/</g,'&lt;'); }
function markDirty() { isDirty = true; }

function setRating(n) {
  document.getElementById("f-rating").value = n;
  document.querySelectorAll(".star").forEach((s,i) => s.classList.toggle("active", i < n));
  markDirty();
}

function addPhoto() {
  const input = document.getElementById("new-photo-url");
  const url = input.value.trim();
  if (!url) return;
  input.value = "";
  const grid = document.getElementById("photos-grid");
  const isFirst = grid.children.length === 0;
  const div = document.createElement("div");
  div.className = `photo-card ${isFirst ? 'main-photo' : ''}`;
  div.setAttribute("data-url", url);
  div.innerHTML = `<img src="${url}" onerror="this.parentElement.style.opacity='0.3'"/>
    ${isFirst ? '<span class="main-badge">Principal</span>' : ''}
    <button class="remove-btn" onclick="removePhoto('${url}')">×</button>`;
  grid.appendChild(div);
  markDirty();
}

function removePhoto(url) {
  const cards = document.querySelectorAll(".photo-card");
  cards.forEach(c => { if (c.getAttribute("data-url") === url) c.remove(); });
  // remark first as main
  const first = document.querySelector(".photo-card");
  if (first) {
    first.classList.add("main-photo");
    if (!first.querySelector(".main-badge")) {
      const b = document.createElement("span");
      b.className = "main-badge";
      b.textContent = "Principal";
      first.appendChild(b);
    }
  }
  markDirty();
}

function addTag() {
  const input = document.getElementById("new-tag");
  const tag = input.value.trim().toLowerCase();
  if (!tag) return;
  input.value = "";
  const wrap = document.getElementById("tags-wrap");
  const span = document.createElement("span");
  span.className = "tag-chip";
  span.setAttribute("data-tag", tag);
  span.innerHTML = `${tag}<button onclick="removeTag(this,'${tag}')">×</button>`;
  wrap.appendChild(span);
  markDirty();
}

function removeTag(btn, tag) {
  btn.parentElement.remove();
  markDirty();
}

function collectPhotos() {
  return [...document.querySelectorAll(".photo-card")].map(c => c.getAttribute("data-url"));
}

function collectTags() {
  return [...document.querySelectorAll(".tag-chip")].map(c => c.getAttribute("data-tag"));
}

function collectMusicStyles() {
  return [...document.querySelectorAll("#music-grid input:checked")].map(i => i.value);
}

// ── Save ─────────────────────────────────────────────────────────────────────
async function saveVenue() {
  const btn = document.getElementById("save-btn");
  btn.disabled = true;
  btn.textContent = "Sauvegarde…";

  const photos = collectPhotos();
  const payload = {
    id:                   currentId,
    name:                 document.getElementById("f-name").value.trim(),
    type:                 document.getElementById("f-type").value,
    address:              document.getElementById("f-address").value.trim(),
    neighborhood:         document.getElementById("f-neighborhood").value.trim(),
    lat:                  parseFloat(document.getElementById("f-lat").value) || null,
    lng:                  parseFloat(document.getElementById("f-lng").value) || null,
    website:              document.getElementById("f-website").value.trim(),
    instagram:            document.getElementById("f-instagram").value.trim(),
    phone:                document.getElementById("f-phone").value.trim(),
    hours:                document.getElementById("f-hours").value.trim(),
    capacity:             parseInt(document.getElementById("f-capacity").value) || null,
    vibe:                 document.getElementById("f-vibe").value.trim(),
    crowd_type:           document.getElementById("f-crowd").value.trim(),
    music_styles:         collectMusicStyles(),
    cover_typical:        document.getElementById("f-cover").value.trim(),
    cover_notes:          document.getElementById("f-cover-notes").value.trim(),
    drink_price_beer:     document.getElementById("f-beer").value.trim(),
    drink_price_cocktail: document.getElementById("f-cocktail").value.trim(),
    entry_difficulty:     document.getElementById("f-difficulty").value,
    dress_code:           document.getElementById("f-dresscode").value.trim(),
    wait_time_typical:    document.getElementById("f-wait").value.trim(),
    guestlist_recommended:document.getElementById("f-guestlist").checked,
    face_control:         document.getElementById("f-facecontrol").checked,
    notes:                document.getElementById("f-notes").value.trim(),
    photo_main:           photos[0] || null,
    photos:               photos,
    tags:                 collectTags(),
    rating:               parseFloat(document.getElementById("f-rating").value) || null,
  };

  const { ok, data, status } = await sbFetch("POST", "venues", [payload]);
  btn.disabled = false;
  btn.textContent = "💾 Sauvegarder";
  if (ok) {
    isDirty = false;
    // update local cache
    const idx = allVenues.findIndex(x => x.id === currentId);
    if (idx >= 0) allVenues[idx] = { ...allVenues[idx], ...payload };
    renderList(document.getElementById("search").value.toLowerCase());
    showToast("✅ Venue sauvegardé avec succès", "success");
  } else {
    showToast(`❌ Erreur ${status}: vérifier la console`, "error");
    console.error(data);
  }
}

// ── New venue ─────────────────────────────────────────────────────────────────
function newVenue() {
  if (isDirty && !confirm("Des modifications non sauvegardées seront perdues.")) return;
  const id = "venue-" + Date.now();
  const v = {
    id, name: "Nouveau venue", type: "bar-club", address: "", neighborhood: "",
    lat: null, lng: null, website: "", instagram: "", phone: "", hours: "",
    capacity: null, vibe: "", crowd_type: "", music_styles: [],
    cover_typical: "", cover_notes: "", drink_price_beer: "", drink_price_cocktail: "",
    entry_difficulty: "Facile", dress_code: "", wait_time_typical: "",
    guestlist_recommended: false, face_control: false, notes: "",
    photo_main: "", photos: [], tags: [], rating: null,
  };
  allVenues.unshift(v);
  document.getElementById("stat-count").textContent = allVenues.length;
  currentId = id;
  isDirty = true;
  renderList();
  renderEditor(v);
}

// ── Delete venue ─────────────────────────────────────────────────────────────
async function deleteVenue() {
  if (!confirm(`Supprimer "${allVenues.find(x=>x.id===currentId)?.name}"? Cette action est irréversible.`)) return;
  const { ok } = await sbFetch("DELETE", `venues?id=eq.${currentId}`);
  if (ok) {
    allVenues = allVenues.filter(x => x.id !== currentId);
    currentId = null;
    isDirty = false;
    document.getElementById("stat-count").textContent = allVenues.length;
    document.getElementById("stat-synced").textContent = allVenues.length;
    renderList();
    document.getElementById("editor").style.display = "none";
    document.getElementById("empty-state").style.display = "flex";
    showToast("🗑 Venue supprimé", "success");
  } else {
    showToast("❌ Erreur lors de la suppression", "error");
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = "", 3500);
}

// ── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener("beforeunload", e => {
  if (isDirty) { e.preventDefault(); e.returnValue = ""; }
});

loadVenues();
</script>
